version: "3.8"

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: launchops-postgres-db
    environment:
      POSTGRES_USER: launchops
      POSTGRES_PASSWORD: launchopssecretpassword123
      POSTGRES_DB: launchops_catalog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  web-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: launchops-web-backend
    environment:
      - DATABASE_URL=postgresql://launchops:launchopssecretpassword123@postgres-db:5432/launchops_catalog
      - UPLOAD_DIR=/workspace/uploads
      - SECRET_KEY=supersecretkeyforlaunchopsaiproductiongrade123!#%
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/workspace/uploads
    depends_on:
      - postgres-db
    restart: always

volumes:
  pgdata:
